version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    groups:
      npm-root-production-major:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "major"
      npm-root-development-major:
        dependency-type: "development"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "major"
      npm-root-production-minor:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "minor"
      npm-root-development-minor:
        dependency-type: "development"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "minor"
      npm-root-production-patch:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "patch"
      npm-root-development-patch:
        dependency-type: "development"
        patterns:
          - "*"
        exclude-patterns:
          - "@types/node"
          - "typescript"
          - "react"
          - "next"
          - "vue"
          - "nuxt"
          - "nuxt3"
          - "react-native"
          - "expo"
          - "vuetify"
          - "element-plus"
          - "express"
          - "@nestjs/core"
          - "@nestjs/common"
          - "vite"
          - "webpack"
          - "axios"
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
